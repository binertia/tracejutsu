name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-check:
    name: Release check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Run release gate
        env:
          GOCACHE: ${{ runner.temp }}/runtime-guard-gocache
          GOMODCACHE: ${{ runner.temp }}/runtime-guard-gomodcache
        run: scripts/release-check.sh
