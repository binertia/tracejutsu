name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Go race test
        run: go test -race ./...

      - name: eBPF smoke compile check
        run: go test -tags=ebpf_smoke ./internal/ebpf -run '^$'

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Dependency review
        run: |
          scripts/dependency-review.sh --out /tmp/dependency-review.md
          cat /tmp/dependency-review.md

      - name: Build release tarball
        run: scripts/build-release.sh --version 0.0.0-ci-test --out /tmp/tracejutsu-release

      - name: Build Debian package
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev
          scripts/build-deb.sh --version 0.0.0-ci-test --out /tmp/tracejutsu-release --maintainer "CI Test <ci@example.invalid>"

      - name: Verify artifacts
        run: |
          cd /tmp/tracejutsu-release
          sha256sum -c SHA256SUMS
          dpkg-deb --info tracejutsu_0.0.0-ci-test_amd64.deb | grep -F "Version: 0.0.0-ci-test"
          tar -tzf tracejutsu-0.0.0-ci-test-linux-amd64.tar.gz | grep tracejutsu
